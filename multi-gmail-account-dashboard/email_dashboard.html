<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Summary Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0b0e13; color: #c9d1d9; padding: 36px 28px; font-size: 17px; }

    h1 { font-size: 32px; font-weight: 600; color: #f0f6fc; margin-bottom: 6px; letter-spacing: -0.3px; }
    .subtitle { font-size: 16px; color: #8b949e; margin-bottom: 24px; }

    .action-bar { background: #161b22; border: 1px solid #d29922; border-radius: 10px; padding: 14px 20px; margin-bottom: 30px; font-size: 16px; color: #e3b341; }

    .section-label { font-size: 20px; font-weight: 600; color: #c9d1d9; letter-spacing: -0.2px; margin-bottom: 18px; border-left: 4px solid #388bfd; padding-left: 12px; }

    /* ── SUMMARY CARDS ── */
    .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 32px; }

    .summary-card { border-radius: 12px; padding: 24px 18px; text-align: center; border: 1px solid; }
    .sc-1 { background: #0d1117; border-color: #388bfd; }
    .sc-2 { background: #0d1117; border-color: #3fb950; }
    .sc-3 { background: #0d1117; border-color: #bc8cff; }
    .sc-4 { background: #0d1117; border-color: #ffa657; }
    .sc-5 { background: #0d1117; border-color: #ff7b72; }

    .summary-email { font-size: 18px; font-weight: 500; color: #c9d1d9; margin-bottom: 20px; word-break: break-all; line-height: 1.5; }
    .summary-count { font-size: 68px; font-weight: 700; margin-bottom: 6px; line-height: 1; }
    .cnt-1 { color: #388bfd; } .cnt-2 { color: #3fb950; } .cnt-3 { color: #bc8cff; } .cnt-4 { color: #ffa657; } .cnt-5 { color: #ff7b72; }
    .summary-count-label { font-size: 17px; color: #8b949e; margin-bottom: 10px; }
    .summary-deleted { font-size: 15px; color: #ff7b72; font-weight: 500; min-height: 22px; }

    /* ── METRICS ── */
    .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }
    .metric { background: #161b22; border-radius: 12px; padding: 22px 24px; border: 1px solid #21262d; }
    .metric-label { font-size: 18px; font-weight: 500; color: #8b949e; margin-bottom: 10px; }
    .metric-value { font-size: 44px; font-weight: 700; line-height: 1; }
    .mv-blue { color: #388bfd; } .mv-red { color: #ff7b72; } .mv-green { color: #3fb950; } .mv-gray { color: #8b949e; }

    /* ── COLUMNS ── */
    .columns-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; align-items: start; }

    .col-card { border-radius: 12px; border: 1px solid; overflow: hidden; }
    .cc-1 { background: #0d1117; border-color: #388bfd; }
    .cc-2 { background: #0d1117; border-color: #3fb950; }
    .cc-3 { background: #0d1117; border-color: #bc8cff; }
    .cc-4 { background: #0d1117; border-color: #ffa657; }
    .cc-5 { background: #0d1117; border-color: #ff7b72; }

    .col-header { padding: 18px 16px 14px; border-bottom: 1px solid #21262d; }
    .col-account-email { font-size: 15px; font-weight: 600; color: #c9d1d9; margin-bottom: 12px; word-break: break-all; line-height: 1.5; }
    .col-header-actions { display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .col-badge { font-size: 13px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }
    .cb-1 { background: #1f3a5f; color: #79c0ff; }
    .cb-2 { background: #1a3a1a; color: #56d364; }
    .cb-3 { background: #2e1f5e; color: #d2a8ff; }
    .cb-4 { background: #3d2200; color: #ffc680; }
    .cb-5 { background: #3d1a18; color: #ffa198; }
    .col-delete-all { font-size: 13px; color: #ff7b72; background: #2d1210; border: 1px solid #6e2320; padding: 5px 12px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
    .col-delete-all:hover { background: #3d1a18; }

    .email-item { padding: 18px 16px; border-bottom: 1px solid #21262d; transition: background 0.15s; }
    .email-item:last-child { border-bottom: none; }
    .email-item:hover { background: rgba(56,139,253,0.05); }
    .email-item.deleted-email { opacity: 0.28; }

    .email-meta-row { display: flex; gap: 8px; margin-bottom: 5px; align-items: baseline; }
    .email-meta-label { font-size: 13px; font-weight: 700; color: #6e7681; text-transform: uppercase; letter-spacing: 0.07em; min-width: 58px; flex-shrink: 0; }
    .email-meta-value { font-size: 14px; color: #8b949e; line-height: 1.6; }
    .email-subject-value { font-size: 17px; font-weight: 600; color: #f0f6fc; line-height: 1.4; }
    .email-item.deleted-email .email-subject-value { text-decoration: line-through; color: #3d444d; }
    .email-body { font-size: 15px; color: #c9d1d9; line-height: 1.8; margin: 12px 0 14px; padding: 14px 16px; background: #161b22; border-left: 3px solid; border-radius: 0 8px 8px 0; }
    .email-item.deleted-email .email-body { color: #3d444d; }

    .email-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .email-tag { font-size: 13px; padding: 4px 11px; border-radius: 6px; font-weight: 600; }
    .tag-red { background: #3d1a18; color: #ffa198; }
    .tag-blue { background: #1f3a5f; color: #79c0ff; }
    .tag-green { background: #1a3a1a; color: #56d364; }
    .tag-amber { background: #3d2200; color: #ffc680; }
    .tag-gray { background: #21262d; color: #8b949e; }

    .del-btn { font-size: 14px; color: #ff7b72; background: #2d1210; border: 1px solid #6e2320; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
    .del-btn:hover { background: #3d1a18; }
    .undo-btn { font-size: 14px; color: #388bfd; background: none; border: none; cursor: pointer; text-decoration: underline; display: none; padding: 7px 0; }
    .email-item.deleted-email .del-btn { display: none; }
    .email-item.deleted-email .undo-btn { display: inline; }

    .bl-1 { border-color: #388bfd; }
    .bl-2 { border-color: #3fb950; }
    .bl-3 { border-color: #bc8cff; }
    .bl-4 { border-color: #ffa657; }
    .bl-5 { border-color: #ff7b72; }

    @media (max-width: 1200px) {
      .summary-grid, .columns-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .summary-grid, .columns-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <div style="display:flex;align-items:center;gap:16px;margin-bottom:6px;">
    <h1>📧 Daily Email Summary</h1>
    <button id="refresh-btn" onclick="fetchEmails()" style="background:#1f3a5f;color:#79c0ff;border:1px solid #388bfd;border-radius:8px;padding:8px 18px;font-size:15px;cursor:pointer;font-weight:600;">↻ Refresh</button>
  </div>
  <p class="subtitle" id="date-line"></p>

  <div class="action-bar" id="action-bar">
    ⏳ Loading emails from n8n…
  </div>

  <!-- SUMMARY -->
  <p class="section-label">Account overview</p>
  <div class="summary-grid" id="summary-grid"></div>

  <!-- METRICS -->
  <p class="section-label">Stats</p>
  <div class="metrics">
    <div class="metric"><div class="metric-label">Total emails</div><div class="metric-value mv-blue" id="m-total">0</div></div>
    <div class="metric"><div class="metric-label">Deleted</div><div class="metric-value mv-red" id="m-deleted">0</div></div>
    <div class="metric"><div class="metric-label">Remaining</div><div class="metric-value mv-gray" id="m-remaining">0</div></div>
    <div class="metric"><div class="metric-label">Active accounts</div><div class="metric-value mv-green" id="m-accounts">5</div></div>
  </div>

  <!-- COLUMNS -->
  <p class="section-label">Emails by account</p>
  <div class="columns-grid" id="columns-grid"></div>

  <script>
    const WEBHOOK_URL = 'https://automationaisanjeev.app.n8n.cloud/webhook/email-summary';

    const summaryCardClasses = ['sc-1','sc-2','sc-3','sc-4','sc-5'];
    const colCardClasses = ['cc-1','cc-2','cc-3','cc-4','cc-5'];
    const colBadgeClasses = ['cb-1','cb-2','cb-3','cb-4','cb-5'];
    const countClasses = ['cnt-1','cnt-2','cnt-3','cnt-4','cnt-5'];

    let accounts = [];
    const deletedEmails = new Set();

    function classifyEmail(from, subject) {
      const text = (from + ' ' + subject).toLowerCase();
      if (text.includes('security') || text.includes('alert') || text.includes('accounts.google')) return { tag: 'tag-red', tagLabel: 'Security' };
      if (text.includes('linkedin job') || text.includes('recruiter') || text.includes('pmo') || text.includes('hiring') || text.includes('apply for')) return { tag: 'tag-blue', tagLabel: 'Job' };
      if (text.includes('linkedin') || text.includes('facebook') || text.includes('quora') || text.includes('twitter')) return { tag: 'tag-gray', tagLabel: 'Social' };
      if (text.includes('economist') || text.includes('newsletter') || text.includes('digest') || text.includes('weekly') || text.includes('skool')) return { tag: 'tag-amber', tagLabel: 'Newsletter' };
      if (text.includes('flutterflow') || text.includes('n8n') || text.includes('jules') || text.includes('claude') || text.includes('scribe') || text.includes('camtasia') || text.includes('ai ')) return { tag: 'tag-green', tagLabel: 'Tech' };
      if (text.includes('iit') || text.includes('upgrad') || text.includes('iiit') || text.includes('programme') || text.includes('course') || text.includes('learning')) return { tag: 'tag-amber', tagLabel: 'Education' };
      if (text.includes('test')) return { tag: 'tag-gray', tagLabel: 'Test' };
      return { tag: 'tag-gray', tagLabel: 'Email' };
    }

    function setStatus(msg, isError) {
      const bar = document.getElementById('action-bar');
      bar.textContent = msg;
      bar.style.color = isError ? '#ff7b72' : '#e3b341';
      bar.style.borderColor = isError ? '#ff7b72' : '#d29922';
    }

    function updateMetrics() {
      const total = accounts.reduce((s, a) => s + a.emails.length, 0);
      const deleted = deletedEmails.size;
      const remaining = total - deleted;
      const active = accounts.filter(a => a.emails.some(e => !deletedEmails.has(e.id))).length;
      document.getElementById('m-total').textContent = total;
      document.getElementById('m-deleted').textContent = deleted;
      document.getElementById('m-remaining').textContent = remaining;
      document.getElementById('m-accounts').textContent = active;
      accounts.forEach(a => {
        const rem = a.emails.filter(e => !deletedEmails.has(e.id)).length;
        const del = a.emails.filter(e => deletedEmails.has(e.id)).length;
        const scount = document.getElementById('scount-' + a.id);
        const sdel = document.getElementById('sdel-' + a.id);
        const cbadge = document.getElementById('cbadge-' + a.id);
        if (scount) scount.textContent = rem;
        if (sdel) sdel.textContent = del > 0 ? del + ' deleted' : '';
        if (cbadge) cbadge.textContent = rem + ' remaining';
      });
    }

    function deleteEmail(emailId) {
      deletedEmails.add(emailId);
      document.getElementById('row-' + emailId).classList.add('deleted-email');
      updateMetrics();
    }

    function undoEmail(emailId) {
      deletedEmails.delete(emailId);
      document.getElementById('row-' + emailId).classList.remove('deleted-email');
      updateMetrics();
    }

    function deleteAll(accountId) {
      const a = accounts.find(x => x.id === accountId);
      a.emails.forEach(e => {
        deletedEmails.add(e.id);
        const row = document.getElementById('row-' + e.id);
        if (row) row.classList.add('deleted-email');
      });
      updateMetrics();
    }

    function renderSummary() {
      document.getElementById('summary-grid').innerHTML = accounts.map((a, i) => `
        <div class="summary-card ${summaryCardClasses[i]}">
          <div class="summary-email">${a.email}</div>
          <div class="summary-count ${countClasses[i]}" id="scount-${a.id}">${a.emails.length}</div>
          <div class="summary-count-label">emails</div>
          <div class="summary-deleted" id="sdel-${a.id}"></div>
        </div>
      `).join('');
    }

    function renderColumns() {
      document.getElementById('columns-grid').innerHTML = accounts.map((a, i) => `
        <div class="col-card ${colCardClasses[i]}">
          <div class="col-header">
            <div class="col-account-email">${a.email}</div>
            <div class="col-header-actions">
              <span class="col-badge ${colBadgeClasses[i]}" id="cbadge-${a.id}">${a.emails.length} remaining</span>
              <button class="col-delete-all" onclick="deleteAll(${a.id})">🗑 All</button>
            </div>
          </div>
          <div>
            ${a.emails.map(e => `
              <div class="email-item" id="row-${e.id}">
                <div class="email-meta-row"><span class="email-meta-label">Date</span><span class="email-meta-value">${e.date}</span></div>
                <div class="email-meta-row"><span class="email-meta-label">From</span><span class="email-meta-value">${e.from}</span></div>
                <div class="email-meta-row" style="margin-bottom:8px;"><span class="email-meta-label">Subject</span><span class="email-subject-value">${e.subject}</span></div>
                <div class="email-body bl-${a.id}">${e.body}</div>
                <div class="email-footer">
                  <span class="email-tag ${e.tag}">${e.tagLabel}</span>
                </div>
                <button class="del-btn" onclick="deleteEmail('${e.id}')">🗑 Delete</button>
                <button class="undo-btn" onclick="undoEmail('${e.id}')">↩ Undo</button>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    async function fetchEmails() {
      setStatus('⏳ Fetching emails from n8n…');
      document.getElementById('refresh-btn').disabled = true;
      try {
        const res = await fetch(WEBHOOK_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        deletedEmails.clear();
        accounts = data.accounts.map((a, i) => ({
          id: i + 1,
          email: a.email,
          emails: a.emails.map(e => {
            const { tag, tagLabel } = classifyEmail(e.from, e.subject);
            return { ...e, tag, tagLabel };
          })
        }));

        const total = accounts.reduce((s, a) => s + a.emails.length, 0);
        const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date-line').textContent =
          new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
          + ` · 5 accounts · ${total} emails · updated ${now}`;

        renderSummary();
        renderColumns();
        updateMetrics();
        setStatus('✅ Live data from n8n · Last updated ' + now);
      } catch (err) {
        setStatus('❌ Failed to fetch: ' + err.message, true);
      } finally {
        document.getElementById('refresh-btn').disabled = false;
      }
    }

    fetchEmails();
  </script>
</body>
</html>
