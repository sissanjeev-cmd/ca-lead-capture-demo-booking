<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>TaskFlow — Sign In</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: #0f0f1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .sub { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 32px; line-height: 1.5; }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #fff;
      color: #1f1f1f;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-google:hover { background: #f0f0f0; }
    .btn-google:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.6); min-height: 20px; }
    .status.error { color: #ff7878; }
    .status.success { color: #4ade80; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✅</div>
    <h1>TaskFlow</h1>
    <p class="sub">Click the button below to sign in with your Google account.<br>You can close this tab afterwards.</p>
    <button class="btn-google" id="btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.021 17.64 11.712 17.64 9.2z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>
    <p class="status" id="status"></p>
  </div>

  <script type="module">
    import { initializeApp }     from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup }
                                  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { firebaseConfig }    from '/firebase-config.js';

    const fbApp  = initializeApp(firebaseConfig);
    const auth   = getAuth(fbApp);
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      status.textContent = 'Opening Google sign-in…';
      status.className = 'status';

      try {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });

        const result     = await signInWithPopup(auth, provider);
        const credential = GoogleAuthProvider.credentialFromResult(result);

        await fetch('/auth/token', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            idToken:     credential.idToken,
            accessToken: credential.accessToken
          })
        });

        status.textContent  = '✅ Signed in! You can close this tab and return to TaskFlow.';
        status.className    = 'status success';
        btn.textContent     = 'Done';

      } catch (e) {
        if (e.code === 'auth/popup-closed-by-user' || e.code === 'auth/cancelled-popup-request') {
          status.textContent = 'Cancelled. Click the button to try again.';
        } else {
          status.textContent = 'Sign-in failed: ' + (e.code || e.message);
          status.className   = 'status error';
        }
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
